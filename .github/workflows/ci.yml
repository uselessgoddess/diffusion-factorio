name: CI

on:
  push:
    branches: [main, "issue-*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast lint pass: formatting + clippy (warnings are errors).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --release -- -D warnings

  # Build + unit tests on the CPU (ndarray) backend.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --all-targets
      - name: test
        run: cargo test --release

  # Smoke train: a tiny CPU run that must (a) finish and (b) show the model
  # actually places structure (placement recall rises above the collapse floor).
  # This is the always-on guard for the "is it really learning?" requirement.
  smoke-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: tiny training run
        run: |
          cargo run --release --bin train -- \
            --steps 200 --batch 16 --hidden 32 --blocks 4 \
            --val-every 100 --val-batch 32 --out /tmp/ci-ckpt/denoiser \
            | tee train.log
      - name: reconstruct + score
        run: |
          cargo run --release --bin sample -- \
            --ckpt /tmp/ci-ckpt/denoiser --show 2 --eval 128 \
            | tee sample.log

  # Does training on many canvas shapes actually beat training on one square?
  #
  # This is the experiment behind cause 5 in docs/GENERALIZATION.md, and it is
  # the one claim in this repo that cannot be settled by an assertion: the
  # coverage argument (experiments/canvas_curriculum, no model needed) proves a
  # square curriculum *cannot show* two of eight families on 13x9, but whether
  # the shape-mixed pool makes the model build better factories there is a
  # question about weights, and only a run answers it.
  #
  # Both arms are trained identically except for the curriculum, then handed the
  # same fixed task on eight canvases. Read the 13x9 row: it is what the issue
  # ran and what the control has never seen. Two runs on a hosted CPU runner is
  # a slow job, so it does not gate every push -- it is here so the decision can
  # be rechecked without anyone pinning a laptop for an hour.
  curriculum:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arm: square
            # The control: one 11x11 canvas, the curriculum as it shipped.
            flags: --size 11
          - arm: shapes
            # Every width x height in 9..=15, one shape per batch.
            flags: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: train (${{ matrix.arm }})
        run: |
          cargo run --release --bin train -- ${{ matrix.flags }} \
            --steps 3000 --batch 16 --hidden 32 --blocks 4 \
            --val-every 500 --val-batch 128 \
            --out /tmp/ckpt-${{ matrix.arm }}/denoiser \
            --metrics-out runs/${{ matrix.arm }}-metrics.jsonl \
            --report-out runs/${{ matrix.arm }}-report.html \
            | tee runs/${{ matrix.arm }}-train.log
      - name: score the same task on eight canvas shapes
        run: |
          cargo run --release --example grid_shape -- \
            /tmp/ckpt-${{ matrix.arm }}/denoiser \
            | tee runs/${{ matrix.arm }}-grid-shape.log
      - name: summary
        run: |
          {
            echo "## curriculum: ${{ matrix.arm }}"
            echo '```'
            cat runs/${{ matrix.arm }}-grid-shape.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: curriculum-${{ matrix.arm }}
          path: runs/
