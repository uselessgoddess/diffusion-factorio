name: CI

on:
  push:
    branches: [main, "issue-*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast lint pass: formatting + clippy (warnings are errors).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --release -- -D warnings

  # Build + unit tests on the CPU (ndarray) backend.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --all-targets
      - name: test
        run: cargo test --release

  # Smoke train: a tiny CPU run that must (a) finish and (b) show the model
  # actually places structure (placement recall rises above the collapse floor).
  # This is the always-on guard for the "is it really learning?" requirement.
  smoke-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: tiny training run
        run: |
          cargo run --release --bin train -- \
            --steps 200 --batch 16 --hidden 32 --blocks 4 \
            --val-every 100 --val-batch 32 --out /tmp/ci-ckpt/denoiser \
            | tee train.log
      - name: reconstruct + score
        run: |
          cargo run --release --bin sample -- \
            --ckpt /tmp/ci-ckpt/denoiser --show 2 --eval 128 \
            | tee sample.log

  # Once assembler answers participate in the loss, does giving their single
  # recipe-bearing anchor enough weight fix the remaining sparse-machine
  # failure measured by the first objective A/B?
  #
  # Both arms use task-only conditioning, exact t=1 examples, the same seed,
  # mixed-shape curriculum, direct-recipe family and architecture. Only the
  # dedicated assembler multiplier changes. Unit tests prove the weight
  # mechanics; this slower run tests what weights learn from them.
  #
  objective:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arm: task-unweighted
            flags: --assembler-weight 1
          - arm: task-weighted
            flags: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: train (${{ matrix.arm }})
        run: |
          mkdir -p runs
          cargo run --release --bin train -- ${{ matrix.flags }} \
            --steps 3000 --batch 16 --hidden 32 --blocks 4 \
            --val-every 500 --val-batch 128 \
            --out /tmp/ckpt-${{ matrix.arm }}/denoiser \
            --metrics-out runs/${{ matrix.arm }}-metrics.jsonl \
            --report-out runs/${{ matrix.arm }}-report.html \
            | tee runs/${{ matrix.arm }}-train.log
      - name: summarize scratch performance by lesson
        run: |
          node -e '
            const fs=require("fs");
            const rows=fs.readFileSync(process.argv[1],"utf8").trim().split("\n").map(JSON.parse);
            const last=[...rows].reverse().find(r=>r.val_scratch);
            console.log(`## objective: ${{ matrix.arm }}`);
            console.log(`aggregate functional: ${last.val_scratch.functional_rate.toFixed(3)}`);
            for (const [name,value] of Object.entries(last.val_scratch_by_lesson))
              console.log(`${name}: functional=${value.functional_rate.toFixed(3)} throughput=${value.throughput.toFixed(3)}`);
          ' runs/${{ matrix.arm }}-metrics.jsonl | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: objective-${{ matrix.arm }}
          path: runs/
